<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VALLEY — 致敬《纪念碑谷》</title>
<style>
  html, body { margin:0; height:100%; overflow:hidden; background:#c997c9; }
  canvas { display:block; touch-action:none; }
  .overlay { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; opacity:0; transition:opacity 1.8s ease; }
  .overlay .big { font-family:'Cormorant Garamond', Georgia, 'Songti SC', serif; font-weight:300; font-size:clamp(44px,7.5vw,104px); letter-spacing:.42em; padding-left:.42em; color:#fffdf8; text-shadow:0 2px 44px rgba(124,52,96,.55); }
  .overlay .small { margin-top:16px; font-family:'Noto Serif SC','Songti SC',serif; font-weight:300; font-size:clamp(12px,1.3vw,16px); letter-spacing:.6em; padding-left:.6em; color:rgba(255,250,242,.88); text-shadow:0 1px 18px rgba(124,52,96,.5); }
  #end .big { font-size:clamp(30px,4.6vw,62px); }
  #endStats { display:grid; grid-template-columns:repeat(3,minmax(82px,1fr)); gap:10px; width:min(460px,calc(100vw - 44px)); margin-top:28px; font-family:'Noto Serif SC','Songti SC',serif; color:rgba(255,252,246,.84); }
  #endStats .stat { border-top:1px solid rgba(255,252,246,.38); padding-top:10px; text-align:center; text-shadow:0 1px 16px rgba(102,58,92,.5); }
  #endStats .label { display:block; font-size:10px; letter-spacing:.32em; color:rgba(255,250,242,.56); }
  #endStats .value { display:block; margin-top:7px; font-size:13px; letter-spacing:.18em; white-space:nowrap; }
  #nextHint { margin-top:18px; font:300 11px 'Noto Serif SC','Songti SC',serif; letter-spacing:.24em; color:rgba(255,250,242,.62); text-shadow:0 1px 16px rgba(102,58,92,.48); }
  #hint { position:fixed; left:50%; bottom:4.5vh; transform:translateX(-50%); font:300 13px 'Noto Serif SC','Songti SC',serif; letter-spacing:.34em; color:rgba(255,252,246,.8); text-shadow:0 1px 12px rgba(120,60,90,.55); opacity:0; transition:opacity 1.4s ease; pointer-events:none; white-space:nowrap; }
  #chapterHud { position:fixed; left:22px; top:18px; width:min(330px,calc(100vw - 44px)); color:rgba(255,252,246,.86); font-family:'Noto Serif SC','Songti SC',serif; text-shadow:0 1px 18px rgba(96,55,87,.42); pointer-events:none; opacity:0; transform:translateY(-8px); transition:opacity 1s ease, transform 1s ease; }
  #chapterHud.show { opacity:1; transform:translateY(0); }
  #chapterHud .line { display:flex; align-items:center; gap:11px; margin-bottom:7px; }
  #chapterHud .num { font:500 12px/1 'Cormorant Garamond', Georgia, serif; letter-spacing:.22em; color:#fffdf8; }
  #chapterHud .bar { flex:1; height:1px; background:rgba(255,252,246,.34); overflow:hidden; }
  #chapterHud .fill { display:block; height:100%; width:5%; background:#fffdf8; box-shadow:0 0 18px rgba(255,255,255,.72); transition:width .8s ease; }
  #chapterHud .name { font-size:15px; letter-spacing:.22em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #chapterHud .task { margin-top:6px; font-size:11px; letter-spacing:.2em; line-height:1.75; color:rgba(255,250,242,.68); }
  #chapterToast { position:fixed; left:50%; top:14vh; transform:translate(-50%,-10px); color:#fffdf8; font:300 13px 'Noto Serif SC','Songti SC',serif; letter-spacing:.42em; text-shadow:0 1px 22px rgba(102,58,92,.56); opacity:0; pointer-events:none; transition:opacity .8s ease, transform .8s ease; white-space:nowrap; }
  #chapterToast.show { opacity:1; transform:translate(-50%,0); }
  #chapterMap { position:fixed; right:18px; top:18px; display:grid; grid-template-columns:repeat(5,12px); gap:9px; padding:2px; opacity:0; transform:translateY(-8px); transition:opacity 1s ease, transform 1s ease; pointer-events:none; }
  #chapterMap.show { opacity:1; transform:translateY(0); pointer-events:auto; }
  #chapterMap button { width:12px; height:12px; border:1px solid rgba(255,252,246,.42); border-radius:50%; padding:0; background:rgba(255,252,246,.1); box-shadow:0 1px 10px rgba(100,56,92,.2); cursor:pointer; }
  #chapterMap button.done { background:rgba(255,252,246,.62); border-color:rgba(255,252,246,.82); }
  #chapterMap button.good { background:rgba(154,242,222,.66); border-color:rgba(214,255,246,.9); }
  #chapterMap button.perfect { background:#ffe2a0; border-color:#fff7db; box-shadow:0 0 14px rgba(255,226,160,.72); }
  #chapterMap button.current { background:#ffe2a0; border-color:#fff7db; box-shadow:0 0 18px rgba(255,226,160,.8); }
  #chapterMap button.locked { opacity:.28; cursor:default; }
  #veil { position:fixed; inset:0; background:linear-gradient(#ffe8cd,#b98ecd); opacity:1; transition:opacity 2.4s ease; pointer-events:none; }
  #again { margin-top:34px; font:300 13px 'Noto Serif SC','Songti SC',serif; letter-spacing:.4em; padding-left:.4em; color:rgba(255,252,246,.75); border:1px solid rgba(255,252,246,.45); border-radius:999px; padding:10px 26px 10px 32px; cursor:pointer; pointer-events:none; transition:all .4s ease; }
  #end.show #again { pointer-events:auto; }
  #again:hover { color:#fff; border-color:rgba(255,255,255,.9); background:rgba(255,255,255,.08); }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&family=Noto+Serif+SC:wght@200;300&display=swap" rel="stylesheet">
</head>
<body>
<div class="overlay" id="title"><div class="big">V A L L E Y</div><div class="small">向《纪念碑谷》致敬</div></div>
<div class="overlay" id="end"><div class="big">第 一 章</div><div class="small">寂静尖塔 · THE SILENT SPIRE</div><div id="endStats"><div class="stat"><span class="label">光印</span><span class="value" id="statSigils">0/0</span></div><div class="stat"><span class="label">机关</span><span class="value" id="statRules">无</span></div><div class="stat"><span class="label">操作</span><span class="value" id="statMoves">0/0</span></div></div><div id="nextHint"></div><div id="again" onclick="location.reload()">再 来 一 次</div></div>
<div id="chapterHud"><div class="line"><span class="num">01 / 20</span><span class="bar"><span class="fill"></span></span></div><div class="name">寂静尖塔</div><div class="task">点击地面行走 · 点击转盘旋转空间</div></div>
<div id="chapterToast">新的章节点亮了</div>
<div id="chapterMap"></div>
<div id="hint">点击地面行走 · 点击转盘旋转空间</div>
<div id="veil"></div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
  }
}
</script>
<script type="module" src="./main.js"></script>
</body>
</html>
